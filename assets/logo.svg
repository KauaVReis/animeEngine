<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Sombra Neo-Brutalist Sólida -->
  <g transform="translate(4, 4)">
    <circle cx="50" cy="55" r="18" fill="#1A1A1A"/>
    <g fill="#1A1A1A">
      <rect x="47" y="32" width="6" height="6" transform="rotate(0 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(30 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(60 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(90 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(120 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(150 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(180 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(210 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(240 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(270 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(300 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(330 50 55)"/>
    </g>
    <path d="M22 42 C22 34 78 34 78 42 L78 50 C78 42 22 42 22 50 Z" fill="#1A1A1A"/>
  </g>

  <!-- Engrenagem (Gear) -->
  <g id="gear-detailed" stroke="#1A1A1A" stroke-width="3" stroke-linejoin="round">
    <circle cx="50" cy="55" r="18" fill="#A0A0A0"/>
    <!-- Dentes da Engrenagem (mais numerosos) -->
    <g fill="#A0A0A0">
      <rect x="47" y="32" width="6" height="6" transform="rotate(0 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(30 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(60 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(90 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(120 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(150 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(180 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(210 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(240 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(270 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(300 50 55)"/>
      <rect x="47" y="32" width="6" height="6" transform="rotate(330 50 55)"/>
    </g>
    <circle cx="50" cy="55" r="7" fill="#EEEEEE"/>
    <circle cx="50" cy="55" r="3" fill="#A0A0A0"/>
  </g>

  <!-- Chapéu de Palha Detalhado (Luffy's Hat) -->
  <g id="hat-detailed" stroke="#1A1A1A" stroke-width="3" stroke-linejoin="round">
    <!-- Aba (Brim) -->
    <path d="M22 42 Q50 34 78 42 Q78 50 50 50 Q22 50 22 42 Z" fill="#EBCB44"/>
    <!-- Copa (Crown) -->
    <path d="M34 40 C34 22 66 22 66 40" fill="#EBCB44"/>
    <!-- Fita Vermelha Detalhada (Red Ribbon) -->
    <path d="M34 37 C34 32 66 32 66 37 L66 41 C66 36 34 36 34 41 Z" fill="#C52F2F"/>
    
    <!-- Detalhes de Textura (Palha) -->
    <g stroke="#1A1A1A" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
      <path d="M38 28 Q40 30 42 28"/>
      <path d="M58 28 Q60 30 62 28"/>
      <path d="M48 24 Q50 26 52 24"/>
      <path d="M30 45 Q50 43 70 45"/>
    </g>
  </g>
</svg>
